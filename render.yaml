services:
  - type: web
    name: packetpath-docusign-replacement
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: RUN_DB_PUSH_ON_STARTUP
        value: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_ENCRYPTION_KEY
        sync: false
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: BLIND_INDEX_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_BASE_URL
        sync: false
